name: Monthly Investment Report

on:
  schedule:
    # Runs at 00:00 on the 14th of every month
    - cron: '0 0 14 * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-genai yfinance

      - name: Run report script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/micro_investor_report.py

      # --- Audit Trail: commit generated report back to the repo ---
      - name: Commit audit trail
        run: |
          git config user.name "J-Morgan Wealth Bot"
          git config user.email "bot@j-morgan-wealth.local"
          git add reports/ || true
          git diff --cached --quiet || git commit -m "📊 Monthly report — $(date +%Y-%m)"
          git push || true
